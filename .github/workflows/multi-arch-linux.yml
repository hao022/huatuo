name: Multi-arch Linux Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-multi-arch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            image: ubuntu:22.04
          - arch: amd64
            image: ubuntu:24.04
          - arch: amd64
            image: fedora:42
          - arch: ppc64le
            image: ppc64le/ubuntu:22.04
          - arch: s390x
            image: s390x/ubuntu:22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
      with:
        platforms: ${{ matrix.arch }}

    - name: Test on ${{ matrix.arch }}
      run: |
        docker run --rm --platform linux/${{ matrix.arch }} -v $(pwd):/workspace -w /workspace ${{ matrix.image }} \
          sh -c "uname -a"
